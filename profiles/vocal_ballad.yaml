# Hermes-Core Mixing Profile: Vocal Ballad
#
# Use with:  hermes vocal-mix --profile profiles/vocal_ballad.yaml ...

chain_variant: "b"
name: "Vocal Ballad"
description: "情歌人声混音配置 — 情感表达优先，保留动态，更多混响营造氛围感"

# ── gain staging ──
clip_gain_ref_db: -18.0
target_lufs: -13.0
ceiling_db: -0.5
tolerance_lufs: 0.3

# ── vocal processing chain ──
vocal_chain:
  - name: "FabFilter Pro-Q 3 (FabFilter)"
  - name: "UAD UA 1176 Rev A"
  - name: "Decapitator (Soundtoys)"
  - name: "FabFilter Pro-DS (FabFilter)"
  - name: "UAD Pultec"
  - name: "RVox Mono (Waves)"
  - name: "Oxford Inflator (Sonnox)"
  - name: "UAD Tube-Tech CL 1B"
  - name: "Maag EQ4 (Plugin Alliance)"

# ── backing (instrumental) processing chain ──
backing_chain: []

# ── reverb bus ──
bus_reverb:
  name: "ValhallaVintageVerb (Valhalla DSP)"
  params:
    Mix: 0.30
reverb_level_db: -16.0

# ── master limiter ──
master_limiter:
  name: "FabFilter Pro-L 2 (FabFilter)"
  params:
    "Output Level": -0.5

# ── genre backing reduction (LU range) ──
genre_table:
  ballad: [3, 5]
