# Hermes-Core Mixing Profile: Vocal Folk
#
# Use with:  hermes vocal-mix --profile profiles/vocal_folk.yaml ...

name: "Vocal Folk"
description: "民谣人声混音配置 — 自然质感优先，最少处理，保留人声原始动态"

# ── gain staging ──
clip_gain_ref_db: -18.0
target_lufs: -13.0
ceiling_db: -0.5
tolerance_lufs: 0.3

# ── vocal processing chain ──
vocal_chain:
  - name: "FabFilter Pro-Q 3 (FabFilter)"
  - name: "CLA-76 Mono (Waves)"
  - name: "FabFilter Pro-DS (FabFilter)"
  - name: "SSLEQ Mono (Waves)"
  - name: "RVox Mono (Waves)"

# ── backing (instrumental) processing chain ──
backing_chain: []

# ── reverb bus ──
bus_reverb:
  name: "ValhallaRoom (Valhalla DSP)"
  params:
    Mix: 0.20
reverb_level_db: -14.0

# ── master limiter ──
master_limiter:
  name: "FabFilter Pro-L 2 (FabFilter)"
  params:
    "Output Level": -0.5

# ── genre backing reduction (LU range) ──
genre_table:
  folk: [3, 6]
