# Hermes-Core Mixing Profile: Vocal Rock
#
# Use with:  hermes vocal-mix --profile profiles/vocal_rock.yaml ...

name: "Vocal Rock"
description: "摇滚人声混音配置 — 更具攻击性的人声，需要穿透密集的吉他墙"

# ── gain staging ──
clip_gain_ref_db: -18.0
target_lufs: -10.0
ceiling_db: -0.5
tolerance_lufs: 0.3

# ── vocal processing chain ──
vocal_chain:
  - name: "FabFilter Pro-Q 3 (FabFilter)"
  - name: "CLA-76 Mono (Waves)"
  - name: "FabFilter Pro-DS (FabFilter)"
  - name: "SSLEQ Mono (Waves)"
  - name: "RVox Mono (Waves)"

# ── backing (instrumental) processing chain ──
backing_chain: []

# ── reverb bus ──
bus_reverb:
  name: "ValhallaPlate (Valhalla DSP)"
  params:
    Mix: 0.22
reverb_level_db: -16.0

# ── delay bus ──（rock 用 slap delay 增加空间感）
bus_delay:
  name: "EchoBoy (Soundtoys)"
  params:
    Mix: 0.18
delay_level_db: -14.0

# ── master limiter ──
master_limiter:
  name: "FabFilter Pro-L 2 (FabFilter)"
  params:
    "Output Level": -0.5

# ── genre backing reduction (LU range) ──
genre_table:
  rock: [6, 10]
