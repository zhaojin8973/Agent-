# Hermes-Core Mixing Profile: Vocal Electronic
#
# Use with:  hermes vocal-mix --profile profiles/vocal_electronic.yaml ...

chain_variant: "b"
name: "Vocal Electronic"
description: "电子人声混音配置 — 大气空间感，较长混响尾，强力动态控制"

# ── gain staging ──
clip_gain_ref_db: -18.0
target_lufs: -9.0
ceiling_db: -0.5
tolerance_lufs: 0.3

# ── vocal processing chain ──
vocal_chain:
  - name: "FabFilter Pro-Q 3 (FabFilter)"
  - name: "UAD UA 1176 Rev A"
  - name: "Decapitator (Soundtoys)"
  - name: "FabFilter Pro-DS (FabFilter)"
  - name: "UAD Pultec"
  - name: "RVox Mono (Waves)"
  - name: "Oxford Inflator (Sonnox)"
  - name: "UAD Tube-Tech CL 1B"
  - name: "Maag EQ4 (Plugin Alliance)"

# ── backing (instrumental) processing chain ──
backing_chain: []

# ── reverb bus ──
bus_reverb:
  name: "ValhallaVintageVerb (Valhalla DSP)"
  params:
    Mix: 0.35
reverb_level_db: -10.0

# ── delay bus ──（电子乐用 ValhallaDelay 做节奏延迟）
bus_delay:
  name: "ValhallaDelay (Valhalla DSP)"
  params:
    Mix: 0.25
delay_level_db: -12.0

# ── master limiter ──
master_limiter:
  name: "FabFilter Pro-L 2 (FabFilter)"
  params:
    "Output Level": -0.5

# ── genre backing reduction (LU range) ──
genre_table:
  electronic: [9, 13]
