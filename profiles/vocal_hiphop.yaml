# Hermes-Core Mixing Profile: Vocal Hip-Hop
#
# Use with:  hermes vocal-mix --profile profiles/vocal_hiphop.yaml ...

name: "Vocal Hip-Hop"
description: "嘻哈人声混音配置 — 近距离感，强压缩控制，较少混响保持前贴感"

# ── gain staging ──
clip_gain_ref_db: -18.0
target_lufs: -9.0
ceiling_db: -0.5
tolerance_lufs: 0.3

# ── vocal processing chain ──
vocal_chain:
  - name: "FabFilter Pro-Q 3 (FabFilter)"
  - name: "UAD UA 1176 Rev A"
  - name: "Decapitator (Soundtoys)"
  - name: "FabFilter Pro-DS (FabFilter)"
  - name: "UAD Pultec"
  - name: "RVox Mono (Waves)"
  - name: "Oxford Inflator (Sonnox)"
  - name: "UAD Tube-Tech CL 1B"
  - name: "Maag EQ4 (Plugin Alliance)"

# ── backing (instrumental) processing chain ──
backing_chain: []

# ── reverb bus ──
bus_reverb:
  name: "ValhallaRoom (Valhalla DSP)"
  params:
    Mix: 0.15
reverb_level_db: -12.0

# ── master limiter ──
master_limiter:
  name: "FabFilter Pro-L 2 (FabFilter)"
  params:
    "Output Level": -0.5

# ── genre backing reduction (LU range) ──
genre_table:
  hiphop: [8, 12]
